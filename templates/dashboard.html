<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">

    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .glass-card { background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(12px); border: 1px solid rgba(226, 232, 240, 0.8); border-radius: 24px; }
        .sidebar { background-color: #0f172a; width: 280px; }
        .sidebar-group-title {
            color: #64748b;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0 24px;
            margin: 20px 0 8px;
        }

            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            border-radius: 12px;
            margin: 3px 12px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #94a3b8;
            font-size: 13px;
            cursor: pointer;
            border-right: 3px solid transparent;
            position: relative;
        }
        .nav-link:hover {
            background: rgba(30, 41, 59, 0.6);
            color: #f59e0b;
            padding-right: 20px;
        }
        .nav-link.active {
            background: #1e293b;
            color: #f59e0b;
            border-right-color: #f59e0b;
            font-weight: 700;
        }
        .edit-badge {
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            opacity: 0.7;
        }
        @keyframes springFadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes springScaleIn {
            from { opacity: 0; transform: scale(0.92); }
            to   { opacity: 1; transform: scale(1); }
        }
        @keyframes springSlideIn {
            from { opacity: 0; transform: translateX(30px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes progressGrow {
            from { width: 0%; }
        }

            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            50%      { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }

        .progress-anim { animation: progressGrow 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        .warning-pulse { animation: pulseWarning 2s infinite; }

            position: absolute;
            right: 11px;
            top: 28px;
            bottom: -16px;
            width: 2px;
            background: #e2e8f0;
        }
        .milestone-item:last-child .milestone-line { display: none; }

            left: -420px;

            align-items: center;

            line-height: 1.6;

            0%, 80%, 100% { transform: translateY(0); }

        /* Modal Styles */

            inset: 0;
            background: rgba(15, 23, 42, 0.45);

        .modal-btn-primary {
            flex: 1;
            background: #f59e0b;
            color: #fff;

            border-radius: 12px;

        .modal-btn-secondary {

        @keyframes fadeIn {

        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>

<body class="flex">
    <div id="root"></div>

    <!-- Chat Sidebar (Vanilla JS) -->
    <div class="chat-overlay" id="chatOverlay" onclick="closeChat()"></div>
    <div class="chat-sidebar" id="chatSidebar">
        <div class="chat-header">
            <div class="flex items-center gap-2">
                <span class="text-xl">⚖️</span>
                <div>
                    <p class="font-bold text-sm">المحامي الذكي</p>
                    <p class="text-[10px] text-slate-400">نظام الاستشارات القانونية</p>
                </div>
            </div>
            <button onclick="closeChat()" class="text-slate-400 hover:text-white text-xl leading-none">&times;</button>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="msg-ai">
                <div class="legal-header"><span>⚖️</span> تحية قانونية</div>
                <div class="legal-body">أهلاً بك المستشار محمد. أنا مساعدك القانوني الذكي. يمكنك طرح استفساراتك القانونية، صياغة العقود، أو مراجعة النصوص القانونية.</div>
            </div>
        </div>
        <div class="chat-input-area">
            <input type="text" class="chat-input" id="chatInput" placeholder="اكتب سؤالك القانوني هنا..." onkeydown="if(event.key==='Enter') sendMessage()">
            <button class="chat-send-btn" onclick="sendMessage()">إرسال</button>
        </div>
    </div>

    <script>
        function openChat() {
            document.getElementById('chatSidebar').classList.add('open');
            document.getElementById('chatOverlay').classList.add('open');
            document.getElementById('chatInput').focus();
        }
        function closeChat() {
            document.getElementById('chatSidebar').classList.remove('open');
            document.getElementById('chatOverlay').classList.remove('open');
        }
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if (!msg) return;
            const chatMessages = document.getElementById('chatMessages');
            const userDiv = document.createElement('div');
            userDiv.className = 'msg-user';
            userDiv.textContent = msg;
            chatMessages.appendChild(userDiv);
            input.value = '';
            chatMessages.scrollTop = chatMessages.scrollHeight;

            const typingDiv = document.createElement('div');
            typingDiv.className = 'msg-ai typing-indicator';
            typingDiv.id = 'typing';
            typingDiv.innerHTML = '<span></span><span></span><span></span>';
            chatMessages.appendChild(typingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            try {
                const res = await fetch('/ask_ai', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });
                const data = await res.json();
                document.getElementById('typing').remove();
                const aiDiv = document.createElement('div');
                aiDiv.className = 'msg-ai';
                aiDiv.innerHTML = '<div class="legal-header"><span>⚖️</span> رأي قانوني</div><div class="legal-body">' + escapeHtml(data.reply).replace(/\n/g, '<br>') + '</div>';
                chatMessages.appendChild(aiDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            } catch (err) {
                document.getElementById('typing').remove();
                const errDiv = document.createElement('div');
                errDiv.className = 'msg-ai';
                errDiv.innerHTML = '<div class="legal-header" style="color:#b91c1c"><span>⚠️</span> خطأ</div><div class="legal-body">حدث خطأ في الاتصال بالنظام القانوني. يرجى المحاولة لاحقاً.</div>';
                chatMessages.appendChild(errDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        }
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>

    {% raw %}
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ================== URL ROUTING ==================
        function getInitialPage() {

        // ================== SIDEBAR NAVIGATION DEFAULTS ==================
        const defaultSidebarGroups = [
            { title: "المحاماة", items: [
                { id: "dashboard", label: "لوحة التحكم", icon: "📊" },

            ]},
            { title: "العلاقات العامة", items: [
                { id: "clients_rel", label: "العملاء", icon: "🤝" },
                { id: "events", label: "المناسبات", icon: "🗓️" },
                { id: "publish", label: "خطط النشر", icon: "📢" }
            ]},
            { title: "الإعلام الرقمي", items: [
                { id: "media", label: "المحتوى الرقمي", icon: "📱" },
                { id: "social", label: "التواصل الاجتماعي", icon: "💬" },
                { id: "analytics", label: "التحليلات", icon: "📈" }
            ]},
            { title: "تطوير الأعمال", items: [
                { id: "foundation", label: "طريق التأسيس", icon: "🎯" },
                { id: "finance", label: "المالية", icon: "💰" },
                { id: "settings", label: "الإعدادات", icon: "⚙️" }
            ]}
        ];

        // ================== MOTION ==================
        function Motion({ children, delay = 0, type = "fadeUp", className = "" }) {
            const [mounted, setMounted] = useState(false);
            useEffect(() => {
                const t = setTimeout(() => setMounted(true), 50);
                return () => clearTimeout(t);
            }, []);
            const styles = {
                fadeUp:  { opacity: mounted ? 1 : 0, transform: mounted ? 'translateY(0)' : 'translateY(24px)', transition: 'all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) ' + delay + 's' },
                scaleIn: { opacity: mounted ? 1 : 0, transform: mounted ? 'scale(1)' : 'scale(0.92)', transition: 'all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) ' + delay + 's' },
                slideIn: { opacity: mounted ? 1 : 0, transform: mounted ? 'translateX(0)' : 'translateX(30px)', transition: 'all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) ' + delay + 's' }
            };
            return <div style={styles[type] || styles.fadeUp} className={className}>{children}</div>;
        }

        // ================== MODAL ==================
        function Modal({ isOpen, onClose, title, fields, onSubmit }) {
            const [form, setForm] = useState({});
            if (!isOpen) return null;
            const handleChange = (key, value) => setForm(prev => ({ ...prev, [key]: value }));
            const handleSubmit = () => {
                const complete = {};
                fields.forEach(f => { complete[f.key] = form[f.key] || (f.type === 'select' ? f.options[0] : ''); });
                onSubmit(complete);
                setForm({});
            };
            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal-content" onClick={e => e.stopPropagation()}>
                        <h3 className="text-lg font-bold text-slate-800 mb-6">{title}</h3>
                        <div>
                            {fields.map(f => (
                                <div key={f.key} className="modal-field">
                                    <label>{f.label}</label>
                                    {f.type === 'select' ? (
                                        <select value={form[f.key] || f.options[0]} onChange={e => handleChange(f.key, e.target.value)}>
                                            {f.options.map(o => <option key={o} value={o}>{o}</option>)}
                                        </select>
                                    ) : (
                                        <input type="text" value={form[f.key] || ''} onChange={e => handleChange(f.key, e.target.value)} placeholder={f.placeholder || ''} />
                                    )}
                                </div>
                            ))}
                        </div>
                        <div className="modal-actions">
                            <button className="modal-btn-primary" onClick={handleSubmit}>حفظ</button>
                            <button className="modal-btn-secondary" onClick={onClose}>إلغاء</button>
                        </div>
                    </div>
                </div>
            );
        }

        // ================== DATA PAGE ==================
        function DataPage({ title, icon, apiEndpoint, fields, description }) {
            const [items, setItems] = useState([]);
            const [modalOpen, setModalOpen] = useState(false);
            const [loading, setLoading] = useState(true);
            const [progress, setProgress] = useState(null);

            const loadData = () => {
                fetch(apiEndpoint)
                    .then(r => r.json())
                    .then(d => { setItems(d.items || []); setLoading(false); })
                    .catch(() => setLoading(false));
            };

            useEffect(() => { loadData(); }, []);

            const handleAdd = async (formData) => {
                try {
                    const res = await fetch(apiEndpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(formData)
                    });
                    const result = await res.json();
                    if (result.success) {
                        setItems(prev => [...prev, result.item]);
                        setModalOpen(false);
                        if (result.progress !== undefined) setProgress(result.progress);
                    }
                } catch (e) {
                    alert('حدث خطأ أثناء الحفظ');
                }
            };

            return (
                <div className="p-10">
                    <Motion delay={0} type="fadeUp">
                        <div className="flex justify-between items-end mb-8">
                            <div>
                                <div className="flex items-center gap-2 mb-1">
                                    <span className="text-2xl">{icon}</span>
                                    <h2 className="text-3xl font-bold text-slate-800">{title}</h2>
                                </div>
                                <p className="text-slate-500">{description}</p>
                            </div>
                            <button onClick={() => setModalOpen(true)} className="bg-amber-600 hover:bg-amber-700 text-white px-5 py-3 rounded-xl font-bold shadow-lg shadow-amber-600/20 transition-all flex items-center gap-2">
                                <span>+</span>
                                <span>إضافة جديد</span>
                            </button>
                        </div>
                        {progress !== null && (
                            <div className="mb-4 bg-emerald-50 text-emerald-700 text-sm font-bold px-4 py-2 rounded-lg inline-flex items-center gap-2">
                                <span>🎯</span>
                                <span>تم تحديث تقدم التأسيس: {progress}%</span>
                            </div>
                        )}
                    </Motion>

                    <Motion delay={0.15} type="scaleIn">
                        <div className="bg-white rounded-3xl shadow-lg border border-slate-100 overflow-hidden">
                            <table className="w-full text-right">
                                <thead className="bg-slate-50 text-slate-500 text-[11px] font-bold uppercase tracking-wide">
                                    <tr>
                                        <th className="px-6 py-4">#</th>
                                        {fields.map(f => <th key={f.key} className="px-6 py-4">{f.label}</th>)}
                                        <th className="px-6 py-4">التاريخ</th>
                                    </tr>
                                </thead>
                                <tbody className="text-sm text-slate-700">
                                    {items.map((item, idx) => (
                                        <tr key={item.id} className="border-t border-slate-100 hover:bg-slate-50 transition-colors">
                                            <td className="px-6 py-4 text-slate-400 text-xs">{idx + 1}</td>
                                            {fields.map(f => <td key={f.key} className="px-6 py-4">{item[f.key]}</td>)}
                                            <td className="px-6 py-4 text-slate-400 text-xs">{item.date}</td>
                                        </tr>
                                    ))}
                                    {items.length === 0 && !loading && (
                                        <tr><td colSpan={fields.length + 2} className="px-6 py-16 text-center text-slate-400">
                                            <div className="text-4xl mb-2">📭</div>
                                            <p>لا توجد بيانات مسجلة بعد</p>
                                        </td></tr>
                                    )}
                                    {loading && (
                                        <tr><td colSpan={fields.length + 2} className="px-6 py-16 text-center text-slate-400">جاري التحميل...</td></tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </Motion>

                    <Modal isOpen={modalOpen} onClose={() => setModalOpen(false)} title={"إضافة " + title} fields={fields} onSubmit={handleAdd} />
                </div>
            );
        }

        // ================== SIDEBAR ==================
        function Sidebar({ activePage, onNavigate }) {
            const [groups, setGroups] = useState(defaultSidebarGroups);
            const [editMode, setEditMode] = useState(false);
            const [visibleItems, setVisibleItems] = useState({});
            const [draggedIdx, setDraggedIdx] = useState(null);
            const [dragOverIdx, setDragOverIdx] = useState(null);

            useEffect(() => {
                fetch('/api/sidebar_config')
                    .then(r => r.json())
                    .then(cfg => {
                        if (cfg.visible_items) setVisibleItems(cfg.visible_items);
                    })
                    .catch(() => {});
                const local = localStorage.getItem('sidebar_visible');
                if (local) {
                    try { setVisibleItems(JSON.parse(local)); } catch(e){}
                }
                const localOrder = localStorage.getItem('sidebar_order');
                if (localOrder) {
                    try {
                        const order = JSON.parse(localOrder);
                        const ordered = order.map(title => defaultSidebarGroups.find(g => g.title === title)).filter(Boolean);
                        if (ordered.length === defaultSidebarGroups.length) setGroups(ordered);
                    } catch(e){}
                }
            }, []);

            const saveVisible = (updated) => {
                setVisibleItems(updated);
                localStorage.setItem('sidebar_visible', JSON.stringify(updated));
                fetch('/api/sidebar_config', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ visible_items: updated })
                }).catch(() => {});
            };

            const saveOrder = (orderedGroups) => {
                setGroups(orderedGroups);
                const titles = orderedGroups.map(g => g.title);
                localStorage.setItem('sidebar_order', JSON.stringify(titles));
                fetch('/api/sidebar_config', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ groups_order: titles })
                }).catch(() => {});
            };

            const toggleItem = (itemId) => {
                const updated = { ...visibleItems, [itemId]: visibleItems[itemId] === false ? true : false };
                saveVisible(updated);
            };

            const handleDragStart = (idx) => { setDraggedIdx(idx); };
            const handleDragOver = (e, idx) => {
                e.preventDefault();
                setDragOverIdx(idx);
            };
            const handleDrop = (targetIdx) => {
                if (draggedIdx === null || draggedIdx === targetIdx) { setDraggedIdx(null); setDragOverIdx(null); return; }
                const newGroups = [...groups];
                const [removed] = newGroups.splice(draggedIdx, 1);
                newGroups.splice(targetIdx, 0, removed);
                saveOrder(newGroups);
                setDraggedIdx(null);
                setDragOverIdx(null);
            };

            return (
                <aside className="sidebar flex flex-col sticky top-0 h-screen shadow-2xl text-slate-300 overflow-y-auto">
                    <div className="p-8 text-center border-b border-slate-800">
                        <div className="bg-gradient-to-tr from-amber-600 to-amber-400 w-16 h-16 flex items-center justify-center rounded-2xl text-white text-2xl font-bold mx-auto mb-3 shadow-lg shadow-amber-900/20">SH</div>
                        <h1 className="font-bold text-lg text-white tracking-wide">شركة شاهين</h1>
                        <p className="text-[10px] text-slate-500 uppercase mt-1">نظام الإدارة الذكية</p>
                    </div>
                    <div className="px-6 pt-4 pb-1 flex justify-between items-center">
                        <span className="text-[10px] text-slate-500 font-bold uppercase tracking-wider">القائمة</span>
                        <button onClick={() => setEditMode(!editMode)} className={`text-[11px] font-bold px-3 py-1.5 rounded-lg transition-all ${editMode ? 'bg-amber-600 text-white' : 'text-amber-500 hover:bg-slate-800'}`}>
                            {editMode ? 'تم التعديل ✓' : '⚙️ تعديل'}
                        </button>
                    </div>
                    {editMode && (
                        <div className="px-6 pb-2">
                            <p className="text-[10px] text-slate-500">اسحب المجموعات لإعادة الترتيب. اضغط على العين لإخفاء/إظهار.</p>
                        </div>
                    )}
                    <nav className="mt-2 flex-grow pb-4">
                        {groups.map((group, gi) => (
                            <div
                                key={gi}
                                draggable={editMode}
                                onDragStart={() => handleDragStart(gi)}
                                onDragOver={e => handleDragOver(e, gi)}
                                onDrop={() => handleDrop(gi)}
                                className={`drag-group ${draggedIdx === gi ? 'dragging' : ''} ${dragOverIdx === gi ? 'drag-over' : ''} ${editMode ? 'border border-dashed border-slate-700 rounded-xl mx-2 mb-2 p-1' : ''}`}
                            >
                                <div className="sidebar-group-title flex justify-between items-center select-none">
                                    <span>{group.title}</span>
                                    {editMode && <span className="text-slate-600 text-xs cursor-grab">⋮⋮</span>}
                                </div>
                                {group.items
                                    .filter(item => editMode || visibleItems[item.id] !== false)
                                    .map(item => (
                                    <div
                                        key={item.id}
                                        className={`nav-link ${activePage === item.id ? 'active' : ''}`}
                                        onClick={() => !editMode && onNavigate(item.id)}
                                    >
                                        <span className="text-lg">{item.icon}</span>
                                        <span>{item.label}</span>
                                        {editMode && (
                                            <button
                                                onClick={(e) => { e.stopPropagation(); toggleItem(item.id); }}
                                                className="edit-badge"
                                                title={visibleItems[item.id] === false ? 'إظهار' : 'إخفاء'}
                                            >
                                                {visibleItems[item.id] === false ? '🚫' : '👁️'}
                                            </button>
                                        )}
                                    </div>
                                ))}
                            </div>
                        ))}
                    </nav>
                    <div className="p-6 border-t border-slate-800">
                        <a href="/" className="flex items-center justify-center gap-2 bg-slate-800 hover:bg-red-900/20 text-red-400 py-3 rounded-xl text-sm font-bold transition-all">
                            🚪 تسجيل الخروج
                        </a>
                    </div>
                </aside>
            );
        }

        // ================== DASHBOARD PAGE ==================
        function DashboardPage() {
            const [stats, setStats] = useState({
                today_sessions: 4, new_clients: 12,
                completed_tasks_percent: 85, consultations: 7
            });
            useEffect(() => {
                fetch('/api/dashboard_stats')
                    .then(r => r.json())
                    .then(d => setStats(d))
                    .catch(() => {});
            }, []);
            const statCards = [
                { label: "جلسات اليوم", value: String(stats.today_sessions).padStart(2, '0'), progress: 75 },
                { label: "الموكلين الجدد", value: String(stats.new_clients).padStart(2, '0'), sub: "↑ 15% منذ الأسبوع الماضي", subColor: "text-emerald-500" },
                { label: "المهام المكتملة", value: stats.completed_tasks_percent + "%", color: "text-blue-600", sub: "باقي 3 مهام قيد التنفيذ", subColor: "text-slate-400" },
                { label: "الاستشارات الفنية", value: String(stats.consultations).padStart(2, '0') }
            ];
            return (
                <div className="p-10">
                    <Motion delay={0} type="fadeUp">
                        <div className="flex justify-between items-end mb-10">
                            <div>
                                <h2 className="text-3xl font-bold text-slate-800">مرحباً بك مجدداً</h2>
                                <p className="text-slate-500 mt-1">إليك ملخص سريع لأداء المكتب اليوم</p>
                            </div>
                            <button className="bg-amber-600 hover:bg-amber-700 text-white px-6 py-3 rounded-xl font-bold shadow-lg shadow-amber-600/20 transition-all">+ قضية جديدة</button>
                        </div>
                    </Motion>
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                        {statCards.map((card, i) => (
                            <Motion key={i} delay={0.08 * (i + 1)} type="scaleIn">
                                <div className="glass-card p-6 shadow-sm hover:shadow-md transition-all">
                                    <p className="text-slate-500 text-xs mb-1">{card.label}</p>
                                    <h3 className={`text-3xl font-bold ${card.color || 'text-slate-800'}`}>{card.value}</h3>
                                    {card.progress && <div className="mt-4 w-full bg-slate-100 h-1.5 rounded-full overflow-hidden"><div className="bg-amber-500 h-full progress-anim" style={{width: card.progress + '%'}}></div></div>}
                                    {card.sub && <p className={`text-[10px] font-bold mt-2 ${card.subColor}`}>{card.sub}</p>}
                                </div>
                            </Motion>
                        ))}
                    </div>
                    <Motion delay={0.5} type="fadeUp">
                        <div className="mt-10 bg-slate-900 rounded-[2rem] p-10 text-white shadow-2xl relative overflow-hidden">
                            <div className="relative z-10">
                                <h3 className="text-2xl font-bold mb-2">الذكاء الاصطناعي القانوني</h3>
                                <p className="text-slate-400 max-w-md">يمكنك الآن البدء في صياغة العقود آلياً أو مراجعة القوانين الجديدة بضغطة زر واحدة.</p>
                                <button onClick={() => window.openChat()} className="mt-6 bg-white text-slate-900 px-8 py-3 rounded-xl font-bold hover:bg-amber-500 hover:text-white transition-all">ابدأ التجربة</button>
                            </div>
                            <div className="absolute -right-20 -bottom-20 w-64 h-64 bg-amber-600/10 rounded-full blur-3xl"></div>
                        </div>
                    </Motion>
                </div>
            );
        }

        // ================== FOUNDATION ROAD PAGE ==================
        function FoundationRoadPage() {
            const [data, setData] = useState({
                team_progress: 65,
                target_goal: "فتح شركة شاهين للمحاماة والاستشارات القانونية رسمياً",
                target_date: "2026-12-31",
                milestones: [],
                members: []
            });
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                fetch('/api/foundation_data')
                    .then(r => r.json())
                    .then(d => { setData(d); setLoading(false); })
                    .catch(() => setLoading(false));
            }, []);

            if (loading) {
                return <div className="p-10 flex items-center justify-center h-96"><div className="text-slate-400 text-lg">جاري تحميل بيانات طريق التأسيس...</div></div>;
            }

            const doneCount = data.milestones.filter(m => m.done).length;
            const totalMs = data.milestones.length;
            const msPercent = totalMs ? Math.round((doneCount / totalMs) * 100) : 0;

            return (
                <div className="p-10">
                    <Motion delay={0} type="fadeUp">
                        <div className="flex justify-between items-end mb-8">
                            <div>
                                <h2 className="text-3xl font-bold text-slate-800">طريق التأسيس</h2>
                                <p className="text-slate-500 mt-1">شريط تقدم الفريق نحو الهدف النهائي</p>
                            </div>
                            <div className="text-left">
                                <p className="text-xs text-slate-400">الهدف النهائي</p>
                                <p className="text-sm font-bold text-amber-600">{data.target_date}</p>
                            </div>
                        </div>
                    </Motion>

                    <Motion delay={0.1} type="scaleIn">
                        <div className="bg-white rounded-3xl p-8 shadow-lg border border-slate-100 mb-8">
                            <div className="flex justify-between items-center mb-4">
                                <div>
                                    <h3 className="text-lg font-bold text-slate-800">{data.target_goal}</h3>
                                    <p className="text-sm text-slate-500 mt-1">نسبة الإنجاز العامة للفريق (تُحسب تلقائياً بناءً على المعالم، أداء الأعضاء، وحجم البيانات المُدخلة)</p>
                                </div>
                                <div className="text-4xl font-bold text-amber-600">{data.team_progress}%</div>
                            </div>
                            <div className="w-full bg-slate-100 h-4 rounded-full overflow-hidden">
                                <div className="bg-gradient-to-l from-amber-500 to-amber-600 h-full rounded-full progress-anim" style={{width: data.team_progress + '%'}}></div>
                            </div>
                            <div className="flex justify-between mt-3 text-xs text-slate-400">
                                <span>البداية</span>
                                <span>المرحلة الانتقالية</span>
                                <span>الهدف النهائي</span>
                            </div>
                        </div>
                    </Motion>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="lg:col-span-2 grid grid-cols-1 md:grid-cols-3 gap-6">
                            {data.members.map((member, i) => (
                                <Motion key={member.id} delay={0.15 * (i + 1)} type="slideIn">
                                    <div className={`bg-white rounded-3xl p-6 shadow-lg border ${member.warning ? 'border-red-200 warning-pulse' : 'border-slate-100'}`}>
                                        <div className="flex items-center gap-3 mb-4">
                                            <div className="w-12 h-12 rounded-xl flex items-center justify-center text-white font-bold text-lg shadow-md" style={{backgroundColor: member.avatar_color}}>{member.initials}</div>
                                            <div>
                                                <h4 className="font-bold text-slate-800 text-sm">{member.name}</h4>
                                                <p className="text-[11px] text-slate-500">{member.role}</p>
                                            </div>
                                        </div>
                                        <div className="mb-3">
                                            <div className="flex justify-between text-xs mb-1">
                                                <span className="text-slate-500">نسبة الإنجاز</span>
                                                <span className={`font-bold ${member.warning ? 'text-red-500' : 'text-amber-600'}`}>{member.progress}%</span>
                                            </div>
                                            <div className="w-full bg-slate-100 h-2.5 rounded-full overflow-hidden">
                                                <div className={`h-full rounded-full progress-anim ${member.warning ? 'bg-red-500' : 'bg-gradient-to-l from-amber-500 to-amber-600'}`} style={{width: member.progress + '%'}}></div>
                                            </div>
                                        </div>
                                        <div className="flex justify-between text-[11px] text-slate-400 border-t border-slate-50 pt-3">
                                            <span>{member.tasks_completed} / {member.tasks_total} مهام</span>
                                            <span>آخر نشاط: {member.last_activity}</span>
                                        </div>
                                        {member.warning && (
                                            <div className="mt-3 bg-red-50 text-red-600 text-xs font-bold px-3 py-2 rounded-lg flex items-center gap-2">
                                                <span>⚠️</span>
                                                <span>تنبيه: أداء منخفض يتطلب متابعة</span>
                                            </div>
                                        )}
                                    </div>
                                </Motion>
                            ))}
                        </div>

                        <Motion delay={0.4} type="fadeUp">
                            <div className="bg-white rounded-3xl p-6 shadow-lg border border-slate-100">
                                <h3 className="font-bold text-slate-800 mb-6 flex items-center gap-2">
                                    <span className="text-amber-500 text-lg">🎯</span>
                                    معالم طريق التأسيس
                                </h3>
                                <div className="text-xs text-slate-400 mb-4 text-center">
                                    {doneCount} من {totalMs} معالم مكتملة ({msPercent}%)
                                </div>
                                <div className="space-y-0">
                                    {data.milestones.map((milestone) => (
                                        <div key={milestone.id} className="milestone-item relative pr-8 pb-6">
                                            <div className="milestone-line"></div>
                                            <div className={`absolute right-0 top-1 w-6 h-6 rounded-full border-2 flex items-center justify-center ${milestone.done ? 'bg-emerald-500 border-emerald-500 text-white' : 'bg-white border-slate-300 text-slate-300'}`}>
                                                {milestone.done && <span className="text-xs">✓</span>}
                                            </div>
                                            <div>
                                                <p className={`text-sm font-bold ${milestone.done ? 'text-slate-800' : 'text-slate-400'}`}>{milestone.title}</p>
                                                <p className="text-[11px] text-slate-400 mt-0.5">{milestone.date}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </Motion>
                    </div>
                </div>
            );
        }

        // ================== PLACEHOLDER PAGE ==================
        function PlaceholderPage({ title, icon, description }) {
            return (
                <div className="p-10">
                    <Motion delay={0} type="fadeUp">
                        <div className="text-center py-20">
                            <div className="text-6xl mb-4">{icon}</div>
                            <h2 className="text-3xl font-bold text-slate-800 mb-2">{title}</h2>
                            <p className="text-slate-500 max-w-md mx-auto">{description}</p>
                            <div className="mt-8 inline-flex items-center gap-2 bg-slate-100 text-slate-500 px-4 py-2 rounded-full text-sm">
                                <span>🚧</span>
                                <span>هذا القسم قيد التطوير</span>
                            </div>
                        </div>
                    </Motion>
                </div>
            );
        }

        // ================== MAIN APP ==================
        function ShaheenApp() {
            const [activePage, setActivePage] = useState(getInitialPage());
            const [pageKey, setPageKey] = useState(0);

            const navigate = (pageId) => {
                setActivePage(pageId);
                setPageKey(k => k + 1);
                const reverseMap = {
                    foundation: 'foundation_road', dashboard: 'dashboard', cases: 'cases',
                    library: 'library', clients_rel: 'clients', events: 'events',
                    publish: 'publish_plans', finance: 'finance', media: 'media',
                    settings: 'settings', courses: 'courses', exams: 'exams',
                    resources: 'resources', social: 'social', analytics: 'analytics'
                };
                window.history.pushState({}, '', '/' + (reverseMap[pageId] || pageId));
            };

            useEffect(() => {
                window.addEventListener('popstate', () => {
                    setActivePage(getInitialPage());
                    setPageKey(k => k + 1);
                });
            }, []);

            const pageTitles = {
                dashboard: 'لوحة التحكم', foundation: 'طريق التأسيس',
                cases: 'القضايا النشطة', library: 'المكتبة القانونية',
                clients_rel: 'العملاء', events: 'المناسبات',
                publish: 'خطط النشر', media: 'الإعلام الرقمي',
                finance: 'المالية', settings: 'الإعدادات',
                courses: 'الدورات التدريبية', exams: 'الاختبارات',
                resources: 'الموارد المعرفية', social: 'التواصل الاجتماعي',
                analytics: 'التحليلات'
            };

            const renderPage = () => {
                switch (activePage) {
                    case 'dashboard': return <DashboardPage />;
                    case 'foundation': return <FoundationRoadPage />;
                    case 'cases': return <DataPage
                        title="القضايا النشطة" icon="⚖️"
                        apiEndpoint="/api/cases"
                        fields={[
                            {key:'title', label:'عنوان القضية', type:'text', placeholder:'أدخل عنوان القضية'},
                            {key:'client', label:'العميل', type:'text', placeholder:'اسم الموكل'},
                            {key:'status', label:'الحالة', type:'select', options:['جارية','معلقة','مغلقة']},
                            {key:'priority', label:'الأولوية', type:'select', options:['عالية','متوسطة','منخفضة']}
                        ]}
                        description="سجل القضايا والدعاوى القانونية النشطة تحت إدارة شركة شاهين."
                    />;
                    case 'library': return <DataPage
                        title="المكتبة القانونية" icon="📚"
                        apiEndpoint="/api/library"
                        fields={[
                            {key:'title', label:'العنوان', type:'text', placeholder:'عنوان المادة القانونية'},
                            {key:'type', label:'النوع', type:'select', options:['نظام','مرسوم','نموذج','مقال']},
                            {key:'category', label:'التصنيف', type:'text', placeholder:'مثال: تجاري، إجرائي'}
                        ]}
                        description="المكتبة الرقمية للنصوص القانونية، المراجع، والنماذج القضائية."
                    />;
                    case 'clients':
                    case 'clients_rel': return <DataPage
                        title="العملاء والموكلين" icon="🤝"
                        apiEndpoint="/api/clients"
                        fields={[
                            {key:'name', label:'اسم العميل', type:'text', placeholder:'الاسم الكامل'},
                            {key:'type', label:'النوع', type:'select', options:['فرد','شركة','مؤسسة']},
                            {key:'status', label:'الحالة', type:'select', options:['نشط','معلق','مغلق']}
                        ]}
                        description="سجل العملاء والموكلين وتاريخ التعاملات القانونية."
                    />;
                    case 'events': return <DataPage
                        title="المناسبات والفعاليات" icon="🗓️"
                        apiEndpoint="/api/events"
                        fields={[
                            {key:'title', label:'العنوان', type:'text', placeholder:'عنوان الفعالية'},
                            {key:'type', label:'النوع', type:'select', options:['ندوة','ورشة','مؤتمر','لقاء']},
                            {key:'location', label:'الموقع', type:'text', placeholder:'المدينة أو المكان'}
                        ]}
                        description="إدارة الفعاليات، الندوات القانونية، والمناسبات المهنية."
                    />;
                    case 'publish': return <DataPage
                        title="خطط النشر" icon="📢"
                        apiEndpoint="/api/publish"
                        fields={[
                            {key:'title', label:'العنوان', type:'text', placeholder:'عنوان المحتوى'},
                            {key:'platform', label:'المنصة', type:'select', options:['تويتر','لينكدإن','إنستغرام','موقع']},
                            {key:'status', label:'الحالة', type:'select', options:['منشور','مخطط','قيد المراجعة']}
                        ]}
                        description="خطط النشر الرقمي والمحتوى القانوني التوعوي."
                    />;
                    case 'finance': return <PlaceholderPage title="الإدارة المالية" icon="💰" description="الموقف المالي، الميزانية، والتقارير المالية الدورية." />;
                    case 'settings': return <PlaceholderPage title="الإعدادات" icon="⚙️" description="إعدادات النظام، المستخدمين، والصلاحيات." />;
                    default: return <PlaceholderPage title="قيد التطوير" icon="🏗️" description="هذا القسم قيد التطوير وسيتم تفعيله قريباً." />;
                }
            };

            return (
                <div className="flex">
                    <Sidebar activePage={activePage} onNavigate={navigate} />
                    <main className="flex-grow min-h-screen">
                        <header className="h-20 bg-white/50 backdrop-blur-md sticky top-0 z-10 flex items-center justify-between px-10 border-b border-slate-200">
                            <div className="flex items-center gap-2 text-slate-400 text-sm">
                                <span>الرئيسية</span>
                                <span>/</span>
                                <span className="text-slate-800 font-bold">{pageTitles[activePage] || activePage}</span>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="text-left leading-tight text-right">
                                    <p className="text-sm font-bold text-slate-700">المستشار محمد</p>
                                    <p className="text-[10px] text-emerald-600 font-bold">متصل الآن</p>
                                </div>
                                <div className="w-10 h-10 bg-gradient-to-tr from-amber-500 to-amber-300 rounded-full border-2 border-white shadow-sm flex items-center justify-center text-white text-sm font-bold">مح</div>
                            </div>
                        </header>
                        <div key={pageKey}>{renderPage()}</div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ShaheenApp />);
    </script>
    {% endraw %}
</body>
</html>
